
<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Çanakkale AR</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; }
      
      /* Video başlatma butonu tasarımı */
      #playButton {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 1000;
        padding: 15px 30px;
        font-size: 18px;
        background-color: rgba(0, 0, 0, 0.8);
        color: white;
        border: 2px solid white;
        border-radius: 10px;
        cursor: pointer;
        display: none; /* Hedef resim bulununca görünür olacak */
      }
    </style>
  </head>
  <body>
    <button id="playButton">Videoyu Başlat</button>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; filterMinCF:0.0001; filterBeta: 0.001;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="canakkaleVideo" src="./resim_video/canakkale.mp4" loop crossorigin="anonymous" playsinline webkit-playsinline></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-video src="#canakkaleVideo" position="0 0 0" height="0.5625" width="1"></a-video>
      </a-entity>
      
    </a-scene>

    <script>
      // Gerekli HTML elemanlarını seçiyoruz
      const target = document.querySelector('[mindar-image-target="targetIndex: 0"]');
      const video = document.querySelector('#canakkaleVideo');
      const playButton = document.querySelector('#playButton');

      // Kamera resmi yakaladığında çalışacak kodlar
      target.addEventListener("targetFound", () => {
        if (video.paused) {
            playButton.style.display = 'block'; // Butonu göster
        }
      });

      // Butona tıklandığında videoyu oynat ve butonu gizle
      playButton.addEventListener('click', () => {
          video.play();
          playButton.style.display = 'none';
      });

      // Kamera resimden uzaklaştığında (resim kaybedildiğinde) çalışacak kodlar
      target.addEventListener("targetLost", () => {
        video.pause(); // Videoyu duraklat
        playButton.style.display = 'none'; // Butonu gizle
      });
    </script>
  </body>
</html>
